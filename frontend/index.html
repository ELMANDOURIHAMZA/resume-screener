<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screening Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1em;
        }

        textarea, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        textarea:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        input[type="number"] {
            width: 150px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
            padding: 12px 20px;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 30px;
        }

        .results-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .result-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .result-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result-rank {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 50%;
            font-weight: 600;
            margin-right: 10px;
            width: 30px;
            height: 30px;
            text-align: center;
            line-height: 20px;
        }

        .result-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-score {
            margin-left: auto;
            font-weight: 600;
            color: #667eea;
            font-size: 1.2em;
        }

        .result-details {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .error {
            background: #fee;
            border-left: 4px solid #f00;
            color: #c00;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .success-message {
            background: #efe;
            border-left: 4px solid #0f0;
            color: #060;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 1.1em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            input[type="number"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Resume Screening Assistant</h1>
            <p>Trouvez les meilleurs candidats en quelques secondes</p>
        </div>

        <form id="rankingForm">
            <div class="form-group">
                <label for="jobDescription">Description du poste :</label>
                <textarea id="jobDescription" placeholder="Entrez la description de l'offre d'emploi..." required></textarea>
            </div>

            <div class="form-group">
                <label for="topK">Nombre de candidats à afficher :</label>
                <input type="number" id="topK" value="5" min="1" max="100">
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Classer les CV</button>
                <button type="button" class="btn-clear" onclick="clearForm()">Réinitialiser</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Traitement en cours...</p>
        </div>

        <div class="error" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <div class="results" id="results">
            <h2 class="results-title">Résultats du classement</h2>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        document.getElementById('rankingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const jobDescription = document.getElementById('jobDescription').value;
            const topK = parseInt(document.getElementById('topK').value);

            if (!jobDescription.trim()) {
                showError('Veuillez entrer une description de poste.');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch('/api/v1/rank', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        job_description: jobDescription,
                        top_k: topK
                    })
                });

                if (!response.ok) {
                    throw new Error('Erreur lors du traitement. Veuillez réessayer.');
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                showError(error.message || 'Une erreur s\'est produite.');
            } finally {
                showLoading(false);
            }
        });

        function displayResults(data) {
            const resultsList = document.getElementById('resultsList');
            const resultsDiv = document.getElementById('results');

            if (!data.results || data.results.length === 0) {
                resultsList.innerHTML = '<div class="no-results">Aucun résultat trouvé.</div>';
                resultsDiv.style.display = 'block';
                return;
            }

            resultsList.innerHTML = data.results.map((result, index) => `
                <div class="result-item">
                    <div class="result-header">
                        <span class="result-rank">${index + 1}</span>
                        <div style="flex: 1;">
                            <strong>${result.resume_id || 'Candidat ' + (index + 1)}</strong>
                        </div>
                        <div class="result-score">${(result.score * 100).toFixed(2)}%</div>
                    </div>
                    <div class="result-details">
                        <p><strong>Catégorie :</strong> ${result.category || 'Non classé'}</p>
                        <p><strong>Pertinence :</strong> ${getRelevanceLabel(result.score)}</p>
                        ${result.keywords_matched ? `<p><strong>Mots-clés matchés :</strong> ${result.keywords_matched.join(', ')}</p>` : ''}
                    </div>
                </div>
            `).join('');

            resultsDiv.style.display = 'block';
        }

        function getRelevanceLabel(score) {
            if (score >= 0.8) return '🟢 Très pertinent';
            if (score >= 0.6) return '🟡 Pertinent';
            if (score >= 0.4) return '🟠 Modérément pertinent';
            return '🔴 Peu pertinent';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        function clearForm() {
            document.getElementById('rankingForm').reset();
            document.getElementById('results').style.display = 'none';
            document.getElementById('topK').value = '5';
            hideError();
        }
    </script>
</body>
</html>
